#       Apps
bind = Super, T, exec, kitty
bind = Super, Q, killactive,
bind = Super, M, exec, loginctl terminate-session $XDG_SESSION_ID
bind = Super, G, exec, ~/.local/bin/gamemode_toggle.sh
bind = Super, B, exec, zen-browser
bind = Super, E, exec, nautilus
bind = Super, F, togglefloating,
bind = Super, R, exec, pkill -x rofi || (swaync-client --close-panel && ~/.config/rofi/scripts/launch_options.sh launcher) 
bind = Super, period, exec, pkill -x rofi || (swaync-client --close-panel && ~/.config/rofi/scripts/launch_options.sh emoji)
bind = Super, P, pseudo,
bind = Super, J, togglesplit,
bind = Super, L, exec, playerctl -a pause; hyprlock
bind = Super, Z, fullscreen
bind = Super+Shift, R, exec, pkill -x rofi || (swaync-client --close-panel && ~/.config/rofi/scripts/wallpaper_picker.sh)

#       Focus
bind = Super, left, movefocus, l
bind = Super, right, movefocus, r
bind = Super, up, movefocus, up 
bind = Super, down, movefocus, d

# Keybindings
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev


#       Window control
bind = Alt, F4, killactive,
bind = Super+Shift+Alt, Q, exec, hyprctl kill


#       Workspaces (silent)
bind = Super+Alt, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1
bind = Super+Alt, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2
bind = Super+Alt, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3
bind = Super+Alt, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4
bind = Super+Alt, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5
bind = Super+Alt, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6
bind = Super+Alt, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7
bind = Super+Alt, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8
bind = Super+Alt, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9
bind = Super+Alt, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10


#       Workspace switch
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

bind = Super, mouse_up, workspace, +1
bind = Super, mouse_down, workspace, -1

#       Move window
bind = Super+Shift, 1, movetoworkspace, 1
bind = Super+Shift, 2, movetoworkspace, 2
bind = Super+Shift, 3, movetoworkspace, 3
bind = Super+Shift, 4, movetoworkspace, 4
bind = Super+Shift, 5, movetoworkspace, 5
bind = Super+Shift, 6, movetoworkspace, 6
bind = Super+Shift, 7, movetoworkspace, 7
bind = Super+Shift, 8, movetoworkspace, 8
bind = Super+Shift, 9, movetoworkspace, 9
bind = Super+Shift, 0, movetoworkspace, 10

bind = Super+Shift, mouse_up, movetoworkspace, r+1
bind = Super+Shift, mouse_down, movetoworkspace, r-1
bind = Super+Shift, Right, movetoworkspace, r+1
bind = Super+Shift, Left, movetoworkspace, r-1
bind = Super+Shift, Page_Down, movetoworkspace, r-1
bind = Super+Shift, Page_Up, movetoworkspace, r+1

bind = Super+Ctrl, Left,  exec, ~/.config/hypr/hyprland/scripts/swap_windows.sh l
bind = Super+Ctrl, Right, exec, ~/.config/hypr/hyprland/scripts/swap_windows.sh r
bind = Super+Ctrl, Up,    exec, ~/.config/hypr/hyprland/scripts/swap_windows.sh u
bind = Super+Ctrl, Down,  exec, ~/.config/hypr/hyprland/scripts/swap_windows.sh d

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

bindn = , mouse:272, exec, ~/.config/rofi/scripts/rofi_click_outside_close.sh

bind = Super+Shift, T, exec, quickshell -c QuickSnip -n 

#       Media
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+; swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; swayosd-client --output-volume lower --device alsa_output.pci-0000_11_00.4.analog-stereo.monitor

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+; swayosd-client --brightness +10
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-; swayosd-client --brightness -10

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPause, exec, playerctl play-pause

bindl = , XF86Calculator, exec, qalculate-gtk


bind = SUPER, V, exec, pkill -x rofi || (swaync-client --close-panel && ~/.config/rofi/scripts/launch_options.sh clipboard)

#       Screenshot
bind = Super+Shift, S, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh region
bind = Super+Shift, P, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh full
bind = Super+Shift+Alt, P, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh all
