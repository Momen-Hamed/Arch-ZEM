# Generated by HyprMod

# Environment
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20

# Settings
cursor:hide_on_key_press = false
cursor:inactive_timeout = 4.0
cursor:persistent_warps = false
decoration:active_opacity = 0.8
decoration:blur:contrast = 0.9
decoration:blur:noise = 0.012
decoration:blur:passes = 3
decoration:blur:size = 3
decoration:blur:special = true
decoration:blur:xray = false
decoration:dim_around = 0.4
decoration:dim_inactive = true
decoration:dim_special = 0.07
decoration:dim_strength = 0.08
decoration:fullscreen_opacity = 0.95
decoration:inactive_opacity = 0.75
decoration:rounding = 25
decoration:rounding_power = 2.0
decoration:shadow:enabled = true
decoration:shadow:range = 35
dwindle:default_split_ratio = 1.0
dwindle:smart_resizing = true
dwindle:smart_split = false
general:allow_tearing = false
general:border_size = 0
general:col.active_border = 0xff597187 0deg
general:col.inactive_border = 0x30000000 0deg
general:gaps_in = 5
general:gaps_out = 12
general:hover_icon_on_border = true
general:layout = dwindle
general:resize_on_border = true
general:snap:border_overlap = false
gestures:workspace_swipe_distance = 600
gestures:workspace_swipe_forever = false
gestures:workspace_swipe_invert = true
gestures:workspace_swipe_touch = false
input:accel_profile = flat
input:natural_scroll = false
input:repeat_rate = 40
input:scroll_factor = 1.0
input:sensitivity = 1.0
misc:disable_hyprland_logo = true
misc:disable_splash_rendering = false
misc:force_default_wallpaper = -1
misc:vrr = 3
scrolling:column_width = 0.1
scrolling:fullscreen_on_one_column = true

# Animations
animation = windows, 1, 10.0, default
animation = layers, 1, 10.0, default
animation = fade, 1, 10.0, default
animation = borderangle, 0

# Keybinds
unbind = SUPER SHIFT, S
bind = SUPER SHIFT, S, exec, hyprshot -m region
